name: Release Desktop App

# Triggered when a version tag (v*) is pushed.
# Builds + signs the Tauri app for macOS/Windows/Linux, then publishes
# the artifacts and latest.json to a GitHub Release for auto-updates.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: "--target aarch64-apple-darwin"
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./desktop/src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Install desktop dependencies (Tauri CLI)
        run: pnpm install --frozen-lockfile
        working-directory: desktop

      # ════════════════════════════════════════════════════════════════
      # Build the Python backend into a standalone executable via PyInstaller.
      # The output (dist/oclaw-gateway/) is copied into the Tauri resources
      # directory so it gets bundled into the installer.
      # ════════════════════════════════════════════════════════════════
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Create Python 3.12 venv and install backend dependencies
        # IMPORTANT: We must force-recreate the venv with Python 3.12.
        # pyproject.toml declares requires-python >= 3.12 (no upper bound).
        # uv's cache can preserve a .venv created with Python 3.14 (the latest
        # version satisfying the constraint). When .venv already exists,
        # `uv sync --python 3.12` silently reuses it instead of rebuilding.
        # PyInstaller 6.x has incomplete support for Python 3.14, causing
        # collect_all() to silently return empty results.
        working-directory: backend
        run: |
          rm -rf .venv
          uv venv --python 3.12
          uv sync
          uv pip install pyinstaller
          echo "=== Verify Python version ==="
          uv run python --version
          echo "=== Verify uvicorn is importable ==="
          uv run python -c "import uvicorn; print('uvicorn', uvicorn.__version__)"

      - name: Build Python backend (macOS/Linux)
        if: matrix.platform != 'windows-latest'
        working-directory: backend
        run: |
          uv run python --version
          uv run pyinstaller ../desktop/backend-build/oclaw-gateway.spec --noconfirm
          mkdir -p ../desktop/src-tauri/resources/gateway
          cp -R dist/oclaw-gateway/* ../desktop/src-tauri/resources/gateway/

      - name: Build Python backend (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        working-directory: backend
        run: |
          uv run python --version
          uv run pyinstaller ../desktop/backend-build/oclaw-gateway.spec --noconfirm
          New-Item -ItemType Directory -Force -Path ../desktop/src-tauri/resources/gateway
          Copy-Item -Path dist/oclaw-gateway/* -Destination ../desktop/src-tauri/resources/gateway/ -Recurse -Force

      # ════════════════════════════════════════════════════════════════
      # Verify the PyInstaller bundle contains all critical ASGI/server
      # packages. A previous build silently shipped a bundle missing
      # uvicorn/fastapi/starlette because collect_all() had swallowed the
      # ImportError, causing "ModuleNotFoundError: No module named 'uvicorn'"
      # at runtime.
      # ════════════════════════════════════════════════════════════════
      - name: Verify gateway bundle contains critical packages
        shell: bash
        run: |
          INTERNAL_DIR="desktop/src-tauri/resources/gateway/_internal"
          if [ ! -d "$INTERNAL_DIR" ]; then
            echo "ERROR: $INTERNAL_DIR does not exist — PyInstaller build likely failed"
            exit 1
          fi
          MISSING=""
          for pkg in uvicorn fastapi starlette pydantic; do
            if [ ! -d "$INTERNAL_DIR/$pkg" ]; then
              MISSING="$MISSING $pkg"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "FATAL: Critical packages missing from PyInstaller bundle:$MISSING"
            echo "Contents of _internal/ (first 30 entries):"
            ls "$INTERNAL_DIR" | head -30
            exit 1
          fi
          echo "✓ All critical packages present in gateway bundle"

      - name: Verify gateway binary exists
        shell: bash
        run: |
          ls -la desktop/src-tauri/resources/gateway/oclaw-gateway* || true
          test -f desktop/src-tauri/resources/gateway/oclaw-gateway || test -f desktop/src-tauri/resources/gateway/oclaw-gateway.exe

      # ════════════════════════════════════════════════════════════════
      # Build + sign the Tauri app.
      # The secret stores the minisign private key as base64 to survive
      # GitHub UI newline mangling. Tauri's signer decodes base64 itself.
      #   TAURI_SIGNING_PRIVATE_KEY        — base64-encoded minisign .key
      #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — password for the key
      # ════════════════════════════════════════════════════════════════
      - name: Build and sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "OClaw ${{ github.ref_name }}"
          releaseBody: "See the assets below to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          # The action auto-generates latest.json pointing to release assets.
          updaterJsonPreferNsis: false

      - name: Upload latest.json as a release asset
        if: matrix.platform == 'macos-14'
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/target/**/release/**/latest.json
          tag_name: ${{ github.ref_name }}
