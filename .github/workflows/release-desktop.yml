name: Release Desktop App

# Triggered when a version tag (v*) is pushed or manually dispatched.
#
# Builds the Electron desktop app (macOS / Windows / Linux) via
# electron-builder, signs + notarizes the macOS build using the team's
# Apple Developer credentials, then publishes the artifacts and
# electron-updater manifests (latest-*.yml) to a GitHub Release.
#
# electron-updater consumes the per-platform `latest-*.yml` manifest
# at runtime to detect + verify new versions.
#
# Required GitHub Secrets (see docs/DESKTOP_RELEASE.md for setup):
#   macOS code signing + notarization
#     - MACOS_CERT_P12_BASE64       base64 of Developer ID Application .p12
#     - MACOS_CERT_PASSWORD          .p12 file password
#     - APPLE_ID                     Apple ID email (e.g. 13609247807@139.com)
#     - APPLE_APP_SPECIFIC_PASSWORD  app-specific password from appleid.apple.com
#     - APPLE_TEAM_ID                Apple Developer Team ID (e.g. DHV5D72JNF)
#   Windows code signing (optional)
#     - WINDOWS_CERT_PFX_BASE64      base64 of code-signing .pfx
#     - WINDOWS_CERT_PASSWORD        .pfx file password
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS (arm64)
            target: mac
            arch: arm64
            build_args: --mac --arm64
            sign_macos: "true"
            sign_windows: "false"
          # macOS x86_64 build is intentionally not generated. Apple
          # Silicon has been the default Mac architecture since 2021
          # and Rosetta 2 covers any stragglers. Dropping the macos-13
          # job saves ~30 min of CI time per release and removes the
          # need for a second macOS runner / notarization round.
          - os: ubuntu-22.04
            label: Linux (deb + rpm)
            target: linux
            arch: x64
            build_args: --linux deb rpm
            sign_macos: "false"
            sign_windows: "false"
          - os: windows-latest
            label: Windows (NSIS)
            target: win
            arch: x64
            build_args: --win nsis
            sign_macos: "false"
            sign_windows: "true"

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # ── macOS code signing + notarization (read by electron-builder) ──
      # electron-builder accepts base64 directly in CSC_LINK and decodes
      # the .p12 on the fly. It also handles the import into a temporary
      # keychain, signing, and notarytool submission automatically when
      # APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID are set.
      CSC_LINK: ${{ matrix.sign_macos == 'true' && secrets.MACOS_CERT_P12_BASE64 || '' }}
      CSC_KEY_PASSWORD: ${{ matrix.sign_macos == 'true' && secrets.MACOS_CERT_PASSWORD || '' }}
      APPLE_ID: ${{ matrix.sign_macos == 'true' && secrets.APPLE_ID || '' }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.sign_macos == 'true' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
      APPLE_TEAM_ID: ${{ matrix.sign_macos == 'true' && secrets.APPLE_TEAM_ID || '' }}
      # ── Windows code signing (optional, .pfx) ──
      WIN_CSC_LINK: ${{ matrix.sign_windows == 'true' && secrets.WINDOWS_CERT_PFX_BASE64 || '' }}
      WIN_CSC_KEY_PASSWORD: ${{ matrix.sign_windows == 'true' && secrets.WINDOWS_CERT_PASSWORD || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install desktop dependencies
        working-directory: desktop-electron
        run: pnpm install --frozen-lockfile

      # ════════════════════════════════════════════════════════════════
      # Build the Python gateway into a standalone executable via
      # PyInstaller. The output is copied into
      # desktop-electron/resources/gateway/ so electron-builder picks
      # it up via extraResources and bundles it as
      # process.resourcesPath/gateway.
      # ════════════════════════════════════════════════════════════════
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Create Python 3.12 venv and install backend dependencies
        # IMPORTANT: pyproject.toml declares requires-python >= 3.12 (no
        # upper bound). uv's cache can preserve a .venv created with
        # Python 3.14 (the latest version satisfying the constraint).
        # `uv venv --clear` wipes the old venv cross-platform. PyInstaller
        # 6.x has incomplete support for Python 3.14, causing
        # collect_all() to silently return empty results.
        working-directory: backend
        run: |
          uv venv --clear --python 3.12
          uv sync
          uv pip install pyinstaller
          echo "=== Verify Python version ==="
          uv run python --version
          echo "=== Verify uvicorn is importable ==="
          uv run python -c "import uvicorn; print('uvicorn', uvicorn.__version__)"

      - name: Build Python gateway (macOS/Linux)
        if: matrix.os != 'windows-latest'
        working-directory: backend
        run: |
          uv run pyinstaller ../desktop-electron/backend-build/oclaw-gateway.spec --noconfirm
          rm -rf ../desktop-electron/resources/gateway
          mkdir -p ../desktop-electron/resources/gateway
          cp -R dist/oclaw-gateway/* ../desktop-electron/resources/gateway/

      - name: Build Python gateway (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        working-directory: backend
        run: |
          uv run pyinstaller ../desktop-electron/backend-build/oclaw-gateway.spec --noconfirm
          if (Test-Path ../desktop-electron/resources/gateway) { Remove-Item ../desktop-electron/resources/gateway -Recurse -Force }
          New-Item -ItemType Directory -Force -Path ../desktop-electron/resources/gateway
          Copy-Item -Path dist/oclaw-gateway/* -Destination ../desktop-electron/resources/gateway/ -Recurse -Force

      # ════════════════════════════════════════════════════════════════
      # Verify the PyInstaller bundle contains all critical ASGI/server
      # packages. A previous build silently shipped a bundle missing
      # uvicorn/fastapi/starlette because collect_all() had swallowed
      # the ImportError, causing "ModuleNotFoundError: No module named
      # 'uvicorn'" at runtime.
      # ════════════════════════════════════════════════════════════════
      - name: Verify gateway bundle contains critical packages
        shell: bash
        run: |
          INTERNAL_DIR="desktop-electron/resources/gateway/_internal"
          if [ ! -d "$INTERNAL_DIR" ]; then
            echo "ERROR: $INTERNAL_DIR does not exist — PyInstaller build likely failed"
            exit 1
          fi
          MISSING=""
          for pkg in uvicorn fastapi starlette pydantic; do
            if [ ! -d "$INTERNAL_DIR/$pkg" ]; then
              MISSING="$MISSING $pkg"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "FATAL: Critical packages missing from PyInstaller bundle:$MISSING"
            echo "Contents of _internal/ (first 30 entries):"
            ls "$INTERNAL_DIR" | head -30
            exit 1
          fi
          echo "✓ All critical packages present in gateway bundle"

      - name: Verify gateway binary exists
        shell: bash
        run: |
          ls -la desktop-electron/resources/gateway/oclaw-gateway* || true
          test -f desktop-electron/resources/gateway/oclaw-gateway || test -f desktop-electron/resources/gateway/oclaw-gateway.exe

      # ════════════════════════════════════════════════════════════════
      # Strip test data / cache / type-stub files from the PyInstaller
      # gateway bundle.
      #
      # collect_all("numpy") / collect_all("scipy") etc. pull in every
      # file in the package, including test data like
      #   numpy/typing/tests/data/fail/*.pyi
      # which is completely useless at runtime but inflates the file
      # count to tens of thousands. On macOS, electron-builder's
      # code-signing step (readDirectoryAndSign) opens every file in the
      # bundle recursively and hits the default `ulimit -n` (256),
      # failing with:
      #   EMFILE: too many open files
      # Removing these dirs cuts the bundle file count dramatically
      # and also reduces DMG size.
      # ════════════════════════════════════════════════════════════════
      - name: Strip test/cache/stub files from gateway bundle
        shell: bash
        run: |
          INTERNAL="desktop-electron/resources/gateway/_internal"
          if [ ! -d "$INTERNAL" ]; then
            echo "WARNING: $INTERNAL not found, skipping cleanup"
            exit 0
          fi

          echo "=== Before cleanup ==="
          echo "File count: $(find "$INTERNAL" -type f | wc -l)"
          echo "Disk usage: $(du -sh "$INTERNAL" | cut -f1)"

          # 1. Remove test directories (numpy/scipy/pandas/etc test data)
          find "$INTERNAL" -type d \( -name "tests" -o -name "test" -o -name "_tests" \) -prune -exec rm -rf {} +
          # 2. Remove __pycache__ directories
          find "$INTERNAL" -type d -name "__pycache__" -prune -exec rm -rf {} +
          # 3. Remove .pyi type-stub files (not needed at runtime —
          #    these are the specific files that triggered EMFILE)
          find "$INTERNAL" -name "*.pyi" -delete
          # 4. Remove .pyc files inside remaining test-like dirs
          find "$INTERNAL" -path "*/testing/*" -name "*.pyc" -delete
          # 5. Remove speech_recognition's prebuilt FLAC binaries.
          #    These are compiled against an SDK older than macOS 10.9,
          #    which Apple's notarization service HARDFAILS on with:
          #      "The binary uses an SDK older than the 10.9 SDK."
          #    The PyInstaller spec excludes the whole package, but this
          #    is a belt-and-suspenders guard in case a future transitive
          #    dep resurrects it.
          rm -f "$INTERNAL"/speech_recognition/flac-* 2>/dev/null || true
          find "$INTERNAL" \( -name "flac-mac" -o -name "flac-linux" -o -name "flac-win32.exe" \) -delete 2>/dev/null || true

          echo "=== After cleanup ==="
          echo "File count: $(find "$INTERNAL" -type f | wc -l)"
          echo "Disk usage: $(du -sh "$INTERNAL" | cut -f1)"

      # ════════════════════════════════════════════════════════════════
      # Build the Next.js frontend as a static export (frontend/out/).
      # electron-builder.yml references `../frontend/out` in
      # extraResources, so this MUST run before the electron-builder
      # step on every platform. Skipping it makes electron-builder
      # fail with "file source doesn't exist" when bundling
      # extraResources. macOS / Windows previously got lucky with
      # the GitHub runner cache, but a fresh ubuntu-22.04 runner
      # has no such cache and the Linux deb/rpm packaging failed
      # for exactly this reason.
      # ════════════════════════════════════════════════════════════════
      - name: Build frontend (Next.js static export)
        working-directory: frontend
        run: pnpm run build:desktop

      - name: Verify frontend/out/ exists
        shell: bash
        run: |
          if [ ! -f frontend/out/index.html ]; then
            echo "ERROR: frontend/out/index.html does not exist — frontend build silently failed"
            ls -la frontend/ 2>&1 | head -10
            exit 1
          fi
          echo "✓ frontend/out/ ready (size: $(du -sh frontend/out/ | cut -f1))"

      # ════════════════════════════════════════════════════════════════
      # Build + sign + notarize + publish via electron-builder.
      #
      # `--publish always` makes electron-builder create (or update) the
      # GitHub Release for the current tag and upload all artifacts
      # (dmg/zip/exe/deb/rpm + blockmaps + latest-*.yml manifests) to
      # it. The four matrix jobs race to do this; electron-builder's
      # GitHub publisher correctly merges uploads from concurrent jobs
      # into the same release, so we don't need a separate
      # "publish" job.
      #
      # For manual dispatch (workflow_dispatch), we still pass
      # `--publish always` so a draft release is created; the maintainer
      # can review the assets in the GitHub UI before clicking
      # "Publish". The release starts in draft mode.
      # ════════════════════════════════════════════════════════════════
      - name: Compile TypeScript (main + preload)
        # MUST use `pnpm run build` instead of calling tsc directly.
        # The build script in package.json includes a critical
        # `mv -f dist/preload.js dist/preload.cjs` step that renames the
        # CommonJS preload bundle so Electron's sandbox loader can find it.
        # main.ts references `preload.cjs`; without the rename the packaged
        # app ships with `preload.js`, preload fails to load, the
        # `window.oclawDesktop` bridge is undefined, and the renderer shows
        # a blank white screen.
        working-directory: desktop-electron
        run: pnpm run build

      - name: Build Electron app
        working-directory: desktop-electron
        # MUST use bash on all three platforms: Windows runners default to
        # PowerShell, which doesn't understand `[[ ]]` or `ulimit`.
        # GitHub's windows runner ships Git Bash, so `shell: bash` works
        # everywhere. The `if macOS` guard ensures ulimit only runs where
        # it's needed (macOS default ulimit -n is 256, too low for signing
        # a large Electron bundle).
        #
        # RETRY: Apple's notarization API (notarytool) intermittently
        # returns HTTP 500 "Internal Server Error" with "Please try
        # again at a later time". This is a server-side hiccup on
        # Apple's end, not a config error — the build typically succeeds
        # on retry. We wrap electron-builder in a retry loop (up to 3
        # attempts) so transient Apple outages don't fail the whole
        # release. Only the notarize step is flaky; signing + packaging
        # are deterministic, so retrying the whole command is safe.
        # The 30s sleep gives Apple's service time to recover.
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            ulimit -n 10240 || true
            echo "ulimit -n = $(ulimit -n)"
          fi

          MAX_ATTEMPTS=3
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== electron-builder attempt $attempt / $MAX_ATTEMPTS ==="
            if pnpm exec electron-builder ${{ matrix.build_args }} --publish always; then
              echo "✓ electron-builder succeeded on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "⚠ electron-builder failed (attempt $attempt). Retrying in 30s..."
              sleep 30
            fi
          done

          echo "✗ electron-builder failed after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Show release output
        if: always()
        shell: bash
        run: |
          echo "=== desktop-electron/release/ contents ==="
          ls -la desktop-electron/release/ || true
