name: Release Desktop App

# Triggered when a version tag (v*) is pushed.
# Builds + publishes the Electron desktop app (macOS / Windows / Linux) via
# electron-builder, then uploads the artifacts and latest-*.yml update
# manifests to a GitHub Release for electron-updater auto-updates.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
          - platform: macos-13
          # AppImage is skipped (matches the prior CI config). deb + rpm
          # covers all major desktop distros.
          - platform: ubuntu-22.04
          - platform: windows-latest

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Install desktop dependencies
        run: pnpm install --frozen-lockfile
        working-directory: desktop-electron

      # ════════════════════════════════════════════════════════════════
      # Build the Python backend into a standalone executable via PyInstaller.
      # The output (dist/oclaw-gateway/) is copied into
      # desktop-electron/resources/gateway/ so electron-builder picks it up
      # via extraResources and bundles it as process.resourcesPath/gateway.
      # ════════════════════════════════════════════════════════════════
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Create Python 3.12 venv and install backend dependencies
        # IMPORTANT: We must force-recreate the venv with Python 3.12.
        # pyproject.toml declares requires-python >= 3.12 (no upper bound).
        # uv's cache can preserve a .venv created with Python 3.14 (the latest
        # version satisfying the constraint). When .venv already exists,
        # `uv sync --python 3.12` silently reuses it instead of rebuilding.
        # `uv venv --clear` wipes the old venv cross-platform (no rm -rf).
        # PyInstaller 6.x has incomplete support for Python 3.14, causing
        # collect_all() to silently return empty results.
        working-directory: backend
        run: |
          uv venv --clear --python 3.12
          uv sync
          uv pip install pyinstaller
          echo "=== Verify Python version ==="
          uv run python --version
          echo "=== Verify uvicorn is importable ==="
          uv run python -c "import uvicorn; print('uvicorn', uvicorn.__version__)"

      - name: Build Python backend (macOS/Linux)
        if: matrix.platform != 'windows-latest'
        working-directory: backend
        run: |
          uv run python --version
          uv run pyinstaller ../desktop-electron/backend-build/oclaw-gateway.spec --noconfirm
          rm -rf ../desktop-electron/resources/gateway
          mkdir -p ../desktop-electron/resources/gateway
          cp -R dist/oclaw-gateway/* ../desktop-electron/resources/gateway/

      - name: Build Python backend (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        working-directory: backend
        run: |
          uv run python --version
          uv run pyinstaller ../desktop-electron/backend-build/oclaw-gateway.spec --noconfirm
          if (Test-Path ../desktop-electron/resources/gateway) { Remove-Item ../desktop-electron/resources/gateway -Recurse -Force }
          New-Item -ItemType Directory -Force -Path ../desktop-electron/resources/gateway
          Copy-Item -Path dist/oclaw-gateway/* -Destination ../desktop-electron/resources/gateway/ -Recurse -Force

      # ════════════════════════════════════════════════════════════════
      # Verify the PyInstaller bundle contains all critical ASGI/server
      # packages. A previous build silently shipped a bundle missing
      # uvicorn/fastapi/starlette because collect_all() had swallowed the
      # ImportError, causing "ModuleNotFoundError: No module named 'uvicorn'"
      # at runtime.
      # ════════════════════════════════════════════════════════════════
      - name: Verify gateway bundle contains critical packages
        shell: bash
        run: |
          INTERNAL_DIR="desktop-electron/resources/gateway/_internal"
          if [ ! -d "$INTERNAL_DIR" ]; then
            echo "ERROR: $INTERNAL_DIR does not exist — PyInstaller build likely failed"
            exit 1
          fi
          MISSING=""
          for pkg in uvicorn fastapi starlette pydantic; do
            if [ ! -d "$INTERNAL_DIR/$pkg" ]; then
              MISSING="$MISSING $pkg"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "FATAL: Critical packages missing from PyInstaller bundle:$MISSING"
            echo "Contents of _internal/ (first 30 entries):"
            ls "$INTERNAL_DIR" | head -30
            exit 1
          fi
          echo "✓ All critical packages present in gateway bundle"

      - name: Verify gateway binary exists
        shell: bash
        run: |
          ls -la desktop-electron/resources/gateway/oclaw-gateway* || true
          test -f desktop-electron/resources/gateway/oclaw-gateway || test -f desktop-electron/resources/gateway/oclaw-gateway.exe

      # ════════════════════════════════════════════════════════════════
      # Build the desktop app via electron-builder.
      #
      # electron-builder picks up:
      #   - dist/main.js + dist/preload.cjs  (TS-compiled main + preload)
      #   - resources/gateway/  (PyInstaller bundle, copied above)
      #   - ../frontend/out/     (Next.js static export)
      #
      # The `release/` directory is the canonical output (matches
      # `directories.output` in electron-builder.yml). We then upload the
      # platform-specific files as release assets.
      # ════════════════════════════════════════════════════════════════
      - name: Build Electron app (macOS)
        if: matrix.platform == 'macos-14' || matrix.platform == 'macos-13'
        working-directory: desktop-electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # electron-builder reads CSC_LINK / CSC_KEY_PASSWORD to sign the
          # .app + .dmg. Set the matching macOS distribution certificate as
          # a base64-encoded secret in repo settings; leave unset for
          # unsigned local builds.
          CSC_LINK: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          pnpm exec tsc -p tsconfig.json
          pnpm exec tsc -p tsconfig.preload.json
          pnpm exec electron-builder --mac --publish never

      - name: Build Electron app (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: desktop-electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm exec tsc -p tsconfig.json
          pnpm exec tsc -p tsconfig.preload.json
          pnpm exec electron-builder --linux deb rpm --publish never

      - name: Build Electron app (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        working-directory: desktop-electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm exec tsc -p tsconfig.json
          pnpm exec tsc -p tsconfig.preload.json
          pnpm exec electron-builder --win nsis --publish never

      # ════════════════════════════════════════════════════════════════
      # Publish release artifacts + electron-updater manifest.
      # electron-updater consumes the per-platform `latest-*.yml` files
      # (generated by electron-builder) to detect + verify updates.
      # ════════════════════════════════════════════════════════════════
      - name: Upload desktop artifacts as release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "OClaw ${{ github.ref_name }}"
          body: "See the assets below to download this version and install."
          draft: true
          prerelease: false
          files: |
            desktop-electron/release/*.dmg
            desktop-electron/release/*.zip
            desktop-electron/release/*.exe
            desktop-electron/release/*.dmg.blockmap
            desktop-electron/release/*.zip.blockmap
            desktop-electron/release/*.exe.blockmap
            desktop-electron/release/latest-mac.yml
            desktop-electron/release/latest-linux.yml
            desktop-electron/release/latest.yml
