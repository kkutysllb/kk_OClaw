name: Release Desktop App

# Triggered when a version tag (v*) is pushed.
# Builds + signs the Tauri app for macOS/Windows/Linux, then publishes
# the artifacts and latest.json to a GitHub Release for auto-updates.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: "--target aarch64-apple-darwin"
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./desktop/src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: frontend

      # ════════════════════════════════════════════════════════════════
      # Build + sign the Tauri app.
      # Signing keys come from GitHub Secrets:
      #   TAURI_SIGNING_PRIVATE_KEY  — the .key file content
      #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — empty string for our key
      # ════════════════════════════════════════════════════════════════
      - name: Build and sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "OClaw ${{ github.ref_name }}"
          releaseBody: "See the assets below to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          # The action auto-generates latest.json pointing to release assets.
          updaterJsonPreferNsis: false

      - name: Upload latest.json as a release asset
        if: matrix.platform == 'macos-14'
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/target/**/release/**/latest.json
          tag_name: ${{ github.ref_name }}
