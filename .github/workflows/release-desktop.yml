name: Release Desktop App

# Triggered when a version tag (v*) is pushed.
# Builds + signs the Tauri app for macOS/Windows/Linux, then publishes
# the artifacts and latest.json to a GitHub Release for auto-updates.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: "--target aarch64-apple-darwin"
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./desktop/src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Install desktop dependencies (Tauri CLI)
        run: pnpm install --frozen-lockfile
        working-directory: desktop

      # ════════════════════════════════════════════════════════════════
      # Build the Python backend into a standalone executable via PyInstaller.
      # The output (dist/oclaw-gateway/) is copied into the Tauri resources
      # directory so it gets bundled into the installer.
      # ════════════════════════════════════════════════════════════════
      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install backend dependencies
        run: |
          uv sync
          uv run pip install pyinstaller
        working-directory: backend

      - name: Build Python backend (macOS/Linux)
        if: matrix.platform != 'windows-latest'
        run: |
          uv run pyinstaller ../desktop/backend-build/oclaw-gateway.spec --noconfirm
          mkdir -p ../desktop/src-tauri/resources/gateway
          cp -R dist/oclaw-gateway/* ../desktop/src-tauri/resources/gateway/
        working-directory: backend

      - name: Build Python backend (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          uv run pyinstaller ../desktop/backend-build/oclaw-gateway.spec --noconfirm
          New-Item -ItemType Directory -Force -Path ../desktop/src-tauri/resources/gateway
          Copy-Item -Path dist/oclaw-gateway/* -Destination ../desktop/src-tauri/resources/gateway/ -Recurse -Force
        working-directory: backend

      - name: Verify gateway binary exists
        shell: bash
        run: |
          ls -la desktop/src-tauri/resources/gateway/oclaw-gateway* || true
          test -f desktop/src-tauri/resources/gateway/oclaw-gateway || test -f desktop/src-tauri/resources/gateway/oclaw-gateway.exe

      # ════════════════════════════════════════════════════════════════
      # Build + sign the Tauri app.
      # Signing keys come from GitHub Secrets (base64-encoded to survive
      # GitHub UI newline mangling):
      #   TAURI_SIGNING_PRIVATE_KEY  — base64-encoded minisign .key content
      #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — password for the key
      # ════════════════════════════════════════════════════════════════
      - name: Diagnose signing secrets
        env:
          _KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          _PWD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          echo "=== Secret diagnosis ==="
          echo "TAURI_SIGNING_PRIVATE_KEY length: ${#_KEY} chars"
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD length: ${#_PWD} chars"
          if [ -n "$_KEY" ]; then
            echo "Key starts with: ${_KEY:0:20}..."
            echo "Key looks like base64: $(echo "$_KEY" | grep -qE '^[A-Za-z0-9+/=]+$' && echo YES || echo NO)"
          else
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is EMPTY or not defined!"
            echo "Check: Settings → Secrets and variables → Actions → Repository secrets"
            echo "Must have a secret named exactly: TAURI_SIGNING_PRIVATE_KEY"
          fi

      - name: Decode Tauri signing key
        env:
          TAURI_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_KEY_B64" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is empty"
            exit 1
          fi
          # Decode base64 → raw minisign format, export via GITHUB_ENV
          DECODED=$(echo "$TAURI_KEY_B64" | base64 -d)
          {
            echo 'TAURI_SIGNING_PRIVATE_KEY<<TAURI_KEY_EOF'
            echo "$DECODED"
            echo 'TAURI_KEY_EOF'
          } >> "$GITHUB_ENV"
          echo "Signing key decoded successfully"

      - name: Build and sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "OClaw ${{ github.ref_name }}"
          releaseBody: "See the assets below to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          # The action auto-generates latest.json pointing to release assets.
          updaterJsonPreferNsis: false

      - name: Upload latest.json as a release asset
        if: matrix.platform == 'macos-14'
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/target/**/release/**/latest.json
          tag_name: ${{ github.ref_name }}
