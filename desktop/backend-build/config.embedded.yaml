# =============================================================================
# OClaw Desktop — Embedded Default Configuration
# =============================================================================
# Copied to the user's app data directory on first run as config.yaml.
# Users can edit via the Settings UI or this file directly.
#
# App Data Locations:
#   macOS:   ~/Library/Application Support/com.oclaw.desktop/
#   Linux:   ~/.local/share/oclaw-desktop/
#   Windows: %APPDATA%/oclaw-desktop/
# =============================================================================

config_version: 8

# ============================================================================
# 日志级别 (debug/info/warning/error)
# ============================================================================
log_level: info

# ============================================================================
# Token Usage — 记录每次模型调用的 token 消耗
# ============================================================================
token_usage:
  enabled: true

# ============================================================================
# Models — 用户通过 Settings 页面配置，初始为空
# ============================================================================
models: []

# ============================================================================
# Tool Groups
# ============================================================================
tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

# ============================================================================
# Tools — 默认工具集（与 config.example.yaml 一致）
# ============================================================================
tools:
  - name: web_search
    group: web
    use: kkoclaw.community.zhipu_web.tools:web_search_tool
    location: cn

  - name: web_fetch
    group: web
    use: kkoclaw.community.zhipu_web.tools:web_fetch_tool
    timeout: 30

  - name: image_search
    group: web
    use: kkoclaw.community.image_search.tools:image_search_tool
    max_results: 5

  - name: ls
    group: file:read
    use: kkoclaw.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: kkoclaw.sandbox.tools:read_file_tool

  - name: glob
    group: file:read
    use: kkoclaw.sandbox.tools:glob_tool
    max_results: 200

  - name: grep
    group: file:read
    use: kkoclaw.sandbox.tools:grep_tool
    max_results: 100

  - name: write_file
    group: file:write
    use: kkoclaw.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: kkoclaw.sandbox.tools:str_replace_tool

  - name: bash
    group: bash
    use: kkoclaw.sandbox.tools:bash_tool

# ============================================================================
# Tool Search — 延迟加载 MCP 工具
# ============================================================================
tool_search:
  enabled: false

# ============================================================================
# Uploads — 文件上传限制
# ============================================================================
uploads:
  max_files: 10
  max_file_size: 52428800    # 50 MiB
  max_total_size: 104857600  # 100 MiB
  auto_convert_documents: false
  pdf_converter: auto

# ============================================================================
# Sandbox — 桌面端默认使用本地执行（无需 Docker）
# ============================================================================
sandbox:
  use: kkoclaw.sandbox.local:LocalSandboxProvider
  allow_host_bash: true
  bash_output_max_chars: 20000
  read_file_output_max_chars: 50000
  ls_output_max_chars: 20000

# ============================================================================
# Skills
# ============================================================================
skills:
  container_path: /mnt/skills

# ============================================================================
# Title Generation — 自动生成对话标题
# ============================================================================
title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null

# ============================================================================
# Summarization — 上下文接近 token 限制时自动摘要
# ============================================================================
summarization:
  enabled: true
  model_name: null
  trigger:
    - type: tokens
      value: 15564
  keep:
    type: messages
    value: 10
  trim_tokens_to_summarize: 15564
  summary_prompt: null
  preserve_recent_skill_count: 5
  preserve_recent_skill_tokens: 25000
  preserve_recent_skill_tokens_per_skill: 5000
  skill_file_read_tool_names:
    - read_file
    - read
    - view
    - cat

# ============================================================================
# Memory — 长期记忆
# ============================================================================
memory:
  enabled: true
  storage_path: memory.json
  debounce_seconds: 30
  model_name: null
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000
  retrieval:
    enabled: false
    strategy: tfidf
    context_max_turns: 4
    context_max_chars: 4000
    similarity_weight: 0.6
    confidence_weight: 0.4
    min_similarity: 0.0

# ============================================================================
# Custom Agent Management API
# ============================================================================
agents_api:
  enabled: false

# ============================================================================
# Skill Self-Evolution
# ============================================================================
skill_evolution:
  enabled: false
  moderation_model_name: null

# ============================================================================
# Database — 桌面端默认使用 SQLite
# ============================================================================
database:
  backend: sqlite
  sqlite_dir: .kkoclaw/data

# ============================================================================
# Run Events Storage — 对话历史持久化
# ============================================================================
run_events:
  backend: db
  max_trace_content: 10240
  track_token_usage: true

# ============================================================================
# Cron Jobs — 桌面端默认关闭
# ============================================================================
cron_management:
  enabled: false
