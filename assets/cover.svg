<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640">
  <defs>
    <!-- Cyberpunk background: deep space with purple and cyan shifts -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#03030a"/>
      <stop offset="30%" style="stop-color:#120a1e"/>
      <stop offset="60%" style="stop-color:#0a1a22"/>
      <stop offset="100%" style="stop-color:#050814"/>
    </linearGradient>

    <!-- Magenta glow -->
    <linearGradient id="glowMagenta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:0.28"/>
      <stop offset="50%" style="stop-color:#e11d48;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0"/>
    </linearGradient>

    <!-- Cyan glow -->
    <linearGradient id="glowCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.28"/>
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:0"/>
    </linearGradient>

    <!-- Title gradient: blue -> cyan -> purple -->
    <linearGradient id="textGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="45%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>

    <!-- Neon line 1 - magenta -->
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#f472b6;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#ff00ff;stop-opacity:0.5"/>
      <stop offset="80%" style="stop-color:#f472b6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0"/>
    </linearGradient>

    <!-- Neon line 2 - cyan -->
    <linearGradient id="line2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0"/>
      <stop offset="25%" style="stop-color:#22d3ee;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#00ffff;stop-opacity:0.5"/>
      <stop offset="75%" style="stop-color:#22d3ee;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:0"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#3b82f6" stroke-width="0.4" opacity="0.07"/>
    </pattern>

    <!-- Glow filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Orb gradients -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:0.35"/>
      <stop offset="60%" style="stop-color:#e11d48;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.3"/>
      <stop offset="60%" style="stop-color:#06b6d4;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="640" fill="url(#bg)"/>
  <rect width="1200" height="640" fill="url(#grid)"/>

  <!-- Cyberpunk orb glows -->
  <ellipse cx="950" cy="150" rx="400" ry="320" fill="url(#orb1)"/>
  <ellipse cx="250" cy="450" rx="350" ry="280" fill="url(#orb2)"/>
  <ellipse cx="600" cy="320" rx="500" ry="200" fill="url(#orb3)" opacity="0.5"/>

  <!-- Scanlines -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="url(#line2)" stroke-width="0.8" opacity="0.35"/>
  <line x1="0" y1="450" x2="1200" y2="450" stroke="url(#line1)" stroke-width="0.8" opacity="0.3"/>

  <!-- Stars / particles: white, cyan, magenta -->
  <circle cx="80" cy="50" r="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="210" cy="90" r="1.5" fill="#22d3ee" opacity="0.7"/>
  <circle cx="340" cy="30" r="0.8" fill="#ffffff" opacity="0.9"/>
  <circle cx="450" cy="120" r="1.2" fill="#f472b6" opacity="0.6"/>
  <circle cx="580" cy="60" r="1" fill="#ffffff" opacity="0.7"/>
  <circle cx="720" cy="40" r="1.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="850" cy="100" r="0.8" fill="#ffffff" opacity="0.8"/>
  <circle cx="1000" cy="55" r="1.2" fill="#f472b6" opacity="0.7"/>
  <circle cx="1100" cy="130" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="120" cy="180" r="1" fill="#22d3ee" opacity="0.5"/>
  <circle cx="320" cy="200" r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="520" cy="150" r="1.5" fill="#f472b6" opacity="0.4"/>
  <circle cx="680" cy="170" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="900" cy="190" r="0.8" fill="#22d3ee" opacity="0.6"/>
  <circle cx="1050" cy="210" r="1.2" fill="#ffffff" opacity="0.7"/>
  <circle cx="50" cy="300" r="1" fill="#f472b6" opacity="0.7"/>
  <circle cx="150" cy="350" r="0.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="50" cy="450" r="1.2" fill="#22d3ee" opacity="0.5"/>
  <circle cx="200" cy="500" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="380" cy="530" r="0.8" fill="#f472b6" opacity="0.7"/>
  <circle cx="550" cy="480" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="700" cy="520" r="1" fill="#22d3ee" opacity="0.6"/>
  <circle cx="850" cy="490" r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="980" cy="540" r="1.2" fill="#f472b6" opacity="0.4"/>
  <circle cx="1120" cy="470" r="1" fill="#22d3ee" opacity="0.6"/>
  <!-- Extra neon particles -->
  <circle cx="180" cy="120" r="0.6" fill="#ff00ff" opacity="0.5"/>
  <circle cx="420" cy="80" r="0.9" fill="#00ffff" opacity="0.4"/>
  <circle cx="780" cy="100" r="0.7" fill="#ff00ff" opacity="0.6"/>
  <circle cx="950" cy="250" r="1.1" fill="#00ffff" opacity="0.5"/>
  <circle cx="110" cy="380" r="0.8" fill="#ff00ff" opacity="0.4"/>
  <circle cx="300" cy="450" r="0.6" fill="#00ffff" opacity="0.5"/>
  <circle cx="650" cy="580" r="0.9" fill="#ff00ff" opacity="0.5"/>
  <circle cx="880" cy="560" r="0.7" fill="#00ffff" opacity="0.4"/>
  <circle cx="1020" cy="350" r="0.8" fill="#ff00ff" opacity="0.6"/>
  <circle cx="1150" cy="300" r="0.6" fill="#00ffff" opacity="0.5"/>
  <circle cx="60" cy="580" r="0.9" fill="#ff00ff" opacity="0.3"/>
  <circle cx="250" cy="600" r="0.7" fill="#00ffff" opacity="0.4"/>
  <circle cx="500" cy="610" r="0.8" fill="#ff00ff" opacity="0.5"/>
  <circle cx="750" cy="50" r="0.6" fill="#00ffff" opacity="0.6"/>

  <!-- Streak lines - enhanced neon -->
  <line x1="100" y1="80" x2="280" y2="78" stroke="url(#line1)" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="600" y1="120" x2="800" y2="118" stroke="url(#line2)" stroke-width="1" filter="url(#glow)"/>
  <line x1="150" y1="350" x2="350" y2="348" stroke="url(#line1)" stroke-width="1.2" filter="url(#glow)"/>
  <line x1="750" y1="450" x2="1000" y2="448" stroke="url(#line2)" stroke-width="1" filter="url(#glow)"/>
  <line x1="400" y1="550" x2="600" y2="548" stroke="url(#line1)" stroke-width="1" filter="url(#glow)"/>
  <line x1="850" y1="80" x2="1050" y2="82" stroke="url(#line2)" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="50" y1="520" x2="200" y2="522" stroke="url(#line2)" stroke-width="1" filter="url(#glow)"/>

  <!-- HUD corner brackets -->
  <polyline points="50,50 50,95 95,95" fill="none" stroke="#ff00ff" stroke-width="1.2" opacity="0.5" filter="url(#glow)"/>
  <polyline points="1150,50 1150,95 1105,95" fill="none" stroke="#00ffff" stroke-width="1.2" opacity="0.5" filter="url(#glow)"/>
  <polyline points="50,590 50,545 95,545" fill="none" stroke="#00ffff" stroke-width="1.2" opacity="0.5" filter="url(#glow)"/>
  <polyline points="1150,590 1150,545 1105,545" fill="none" stroke="#ff00ff" stroke-width="1.2" opacity="0.5" filter="url(#glow)"/>

  <!-- KKOCLAW title - cyberpunk enhanced -->
  <text x="600" y="260" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="96" font-weight="800" fill="url(#textGlow)" filter="url(#bigGlow)" letter-spacing="14">KKOCLAW</text>
  <text x="600" y="260" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="96" font-weight="800" fill="#a5f3fc" letter-spacing="14">KKOCLAW</text>

  <!-- 超级智能体 neon tag -->
  <rect x="528" y="276" width="144" height="26" rx="3" fill="none" stroke="#ff00ff" stroke-width="0.8" opacity="0.5" filter="url(#glow)"/>
  <text x="600" y="295" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif" font-size="16" font-weight="600" fill="#ff00ff" filter="url(#neonGlow)" letter-spacing="10">超级智能体</text>

  <!-- Tagline -->
  <text x="600" y="350" text-anchor="middle" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif" font-size="20" font-weight="400" fill="#94a3b8" letter-spacing="8">开源超级智能体平台</text>

  <!-- Bottom accent line -->
  <line x1="460" y1="385" x2="740" y2="385" stroke="url(#line1)" stroke-width="2" filter="url(#glow)"/>

  <!-- Sub features - alternating cyan / magenta -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748b" letter-spacing="4">
    <tspan fill="#22d3ee">Sub-Agents</tspan>
    <tspan fill="#475569"> · </tspan>
    <tspan fill="#f472b6">Memory</tspan>
    <tspan fill="#475569"> · </tspan>
    <tspan fill="#22d3ee">Sandbox</tspan>
    <tspan fill="#475569"> · </tspan>
    <tspan fill="#f472b6">Skills</tspan>
  </text>
</svg>
