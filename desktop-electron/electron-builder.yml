# electron-builder configuration for OClaw Desktop.
#
# Build:  pnpm --dir desktop-electron run build:app[:full]
# Output: desktop-electron/release/
#
# The Python gateway (PyInstaller bundle) is bundled via `extraResources`
# and resolved at runtime as `process.resourcesPath/gateway`.

appId: com.oclaw.desktop
productName: OClaw
copyright: Copyright © OClaw

directories:
  output: release
  buildResources: build

# node-pty@1.1.0 ships prebuilds compatible with Electron 33 (Node ABI 130)
# for darwin-arm64, darwin-x64, win32-arm64, and win32-x64.  Rebuilding from
# source via node-gyp fails on Python ≥ 3.12 (missing distutils) and is
# unnecessary — the prebuilds already match the target Electron runtime.
npmRebuild: false

# Entry point + compiled preload (relative to desktop-electron/).
files:
  - dist/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.ts"

# Ship the PyInstaller gateway bundle and the static frontend export.
extraResources:
  - from: resources/gateway
    to: gateway
    filter: ["**/*"]
  - from: ../frontend/out
    to: frontend-out
    filter: ["**/*"]
  - from: build/icons
    to: icons
    filter: ["16x16.png", "32x32.png"]

# ── macOS ─────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  # Code signing is enabled automatically when CSC_LINK (base64 .p12) and
  # CSC_KEY_PASSWORD are present in the environment (set in GitHub Actions
  # secrets). For local builds where you want to skip signing, run:
  #   CSC_IDENTITY_AUTO_DISCOVERY=false pnpm exec electron-builder --mac
  # or override on the command line:
  #   electron-builder --config.mac.identity=null
  # Do NOT put `identity: null` here — it permanently disables signing even
  # in CI where credentials are available, shipping unsigned DMGs.
  entitlements: build/Entitlements.plist
  entitlementsInherit: build/Entitlements.plist
  icon: build/icon.icns
  # Notarization: electron-builder v25 auto-notarizes when ALL of these
  # env vars are present — APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD,
  # APPLE_TEAM_ID. We intentionally do NOT set `notarize.teamId` here:
  # v25 deprecated that field and prints a warning asking for the
  # APPLE_TEAM_ID env var instead. Leaving notarize unset lets
  # electron-builder pick up the team id directly from the environment,
  # matching the documented behaviour and silencing the warning.
  #
  # If you ever need to DISABLE notarize (e.g. testing a local build),
  # pass --config.mac.notarize=false on the electron-builder command line.

dmg:
  title: "${productName} ${version}"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ── Windows ───────────────────────────────────────────────────────────────
win:
  target:
    - nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico

# ── Linux ─────────────────────────────────────────────────────────────────
# AppImage is skipped (matches the prior CI config which only built deb+rpm).
linux:
  category: Development
  target:
    - deb
    - rpm
  icon: build/icons
  maintainer: OClaw

# ── Auto-update ───────────────────────────────────────────────────────────
# electron-updater checks these providers for release artifacts.
publish:
  provider: github
  owner: kkutysllb
  repo: kk_OClaw
  releaseType: release
