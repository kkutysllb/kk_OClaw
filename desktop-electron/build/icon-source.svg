<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Front face: yellow (left) → green (right) with sharp split -->
    <linearGradient id="frontSplit" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FEF9C3"/>
      <stop offset="20%"  stop-color="#FEF08A"/>
      <stop offset="42%"  stop-color="#FACC15"/>
      <stop offset="46%"  stop-color="#EAB308"/>
      <stop offset="50%"  stop-color="#A3E635"/>
      <stop offset="54%"  stop-color="#4ADE80"/>
      <stop offset="58%"  stop-color="#22C55E"/>
      <stop offset="80%"  stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#14532D"/>
    </linearGradient>

    <!-- Top-left edge gloss -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="30%"  stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="65%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>

    <!-- Inner hole shadow -->
    <radialGradient id="holeShadow" cx="48%" cy="52%" r="50%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.02"/>
      <stop offset="70%"  stop-color="#000000" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>

    <!-- Background glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FACC15" stop-opacity="0.04"/>
      <stop offset="40%"  stop-color="#4ADE80" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Octagonal O ring path: outer R=400, inner r=260, centre (512,512) -->
  </defs>

  <!-- Scale entire icon to ~82% and center, matching standard macOS icon grid -->
  <g transform="translate(92, 92) scale(0.82)">

  <!-- Background (rounded square) -->
  <rect width="1024" height="1024" rx="150" fill="#151527"/>
  <circle cx="512" cy="512" r="400" fill="url(#bgGlow)"/>

  <!-- Tilted O group — rotate −35° around centre (lower-left tilt) -->
  <g transform="rotate(-35, 512, 512)">

    <!-- ===== Extrusion layers (back → front, for strong 3D depth) ===== -->
    <!-- Layer 5 — deepest back -->
    <path d="M 912,512 L 795,795 L 512,912 L 229,795 L 112,512 L 229,229 L 512,112 L 795,229 Z
             M 772,512 L 696,696 L 512,772 L 328,696 L 252,512 L 328,328 L 512,252 L 696,328 Z"
          fill="#0D0D1F" fill-rule="evenodd" transform="translate(-17, 12)"/>
    <!-- Layer 4 -->
    <path d="M 912,512 L 795,795 L 512,912 L 229,795 L 112,512 L 229,229 L 512,112 L 795,229 Z
             M 772,512 L 696,696 L 512,772 L 328,696 L 252,512 L 328,328 L 512,252 L 696,328 Z"
          fill="#151528" fill-rule="evenodd" transform="translate(-12.75, 9)"/>
    <!-- Layer 3 -->
    <path d="M 912,512 L 795,795 L 512,912 L 229,795 L 112,512 L 229,229 L 512,112 L 795,229 Z
             M 772,512 L 696,696 L 512,772 L 328,696 L 252,512 L 328,328 L 512,252 L 696,328 Z"
          fill="#1D1D32" fill-rule="evenodd" transform="translate(-8.5, 6)"/>
    <!-- Layer 2 -->
    <path d="M 912,512 L 795,795 L 512,912 L 229,795 L 112,512 L 229,229 L 512,112 L 795,229 Z
             M 772,512 L 696,696 L 512,772 L 328,696 L 252,512 L 328,328 L 512,252 L 696,328 Z"
          fill="#262642" fill-rule="evenodd" transform="translate(-4.25, 3)"/>

    <!-- ===== Front face ===== -->
    <path d="M 912,512 L 795,795 L 512,912 L 229,795 L 112,512 L 229,229 L 512,112 L 795,229 Z
             M 772,512 L 696,696 L 512,772 L 328,696 L 252,512 L 328,328 L 512,252 L 696,328 Z"
          fill="url(#frontSplit)" fill-rule="evenodd"/>

    <!-- ===== Edge gloss / shadow overlay ===== -->
    <path d="M 912,512 L 795,795 L 512,912 L 229,795 L 112,512 L 229,229 L 512,112 L 795,229 Z
             M 772,512 L 696,696 L 512,772 L 328,696 L 252,512 L 328,328 L 512,252 L 696,328 Z"
          fill="url(#gloss)" fill-rule="evenodd"/>

    <!-- ===== Inner hole depth ===== -->
    <circle cx="512" cy="512" r="260" fill="url(#holeShadow)"/>

    <!-- ===== "claw" lettering inside the hollow O ===== -->
    <text x="512" y="503"
          text-anchor="middle" dominant-baseline="central"
          font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-weight="700" font-size="112"
          fill="#FFFFFF" fill-opacity="0.90"
          letter-spacing="8">claw</text>
  </g>

  </g>

</svg>
